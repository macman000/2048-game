<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f0;
    --surface: #ede8dc;
    --border: #d0c9b8;
    --accent: #8f7a66;
    --text: #2c2520;
    --text-muted: #9e9080;
    --tile-empty: #d8d0c0;
    --radius: 6px;
    --gap: 10px;
    --board-size: min(460px, 92vw);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: var(--board-size);
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    width: 100%;
  }

  #logo {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(2.8rem, 10vw, 4rem);
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -2px;
  }

  #right-header {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  #scores {
    display: flex;
    gap: 8px;
  }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 14px;
    text-align: center;
    min-width: 80px;
  }

  .score-label {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .score-val {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  #new-btn {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 7px 16px;
    cursor: pointer;
    font-weight: bold;
    transition: opacity .15s, transform .1s;
  }

  #new-btn:hover { opacity: .85; }
  #new-btn:active { transform: scale(.97); }

  /* ── Board ── */
  #board-wrap {
    position: relative;
    width: var(--board-size);
    height: var(--board-size);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: var(--gap);
    background: #bbada0;
    border-radius: 10px;
    padding: var(--gap);
    width: 100%;
    height: 100%;
    border: 1px solid var(--border);
  }

  .cell-bg {
    background: var(--tile-empty);
    border-radius: var(--radius);
  }

  /* Tile layer sits on top */
  #tiles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .tile {
    position: absolute;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    transition: top .1s ease, left .1s ease;
    will-change: top, left;
  }

  .tile.new {
    animation: pop .18s ease forwards;
  }

  .tile.merged {
    animation: bump .18s ease forwards;
  }

  @keyframes pop {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes bump {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  #msg-bar {
    height: 22px;
    font-size: 13px;
    color: #7a6f5a;
  }

  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(250,248,240,.88);
    border-radius: 10px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(2px);
  }

  #overlay.show { display: flex; }

  #overlay-title {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(1.4rem, 6vw, 2rem);
    font-weight: 900;
    color: var(--accent);
  }

  #overlay-sub {
    font-size: 13px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">2048</div>
    <div id="right-header">
      <div id="scores">
        <div class="score-card">
          <div class="score-label">Score</div>
          <div class="score-val" id="score">0</div>
        </div>
        <div class="score-card">
          <div class="score-label">Best</div>
          <div class="score-val" id="best">0</div>
        </div>
      </div>
      <button id="new-btn">New Game</button>
    </div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
    <div id="tiles"></div>
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-sub">press N or click New Game</div>
    </div>
  </div>

  <div id="msg-bar" id="msg"></div>
</div>

<script>
const TILE_COLORS = {
  0:    ['#cdc1b4', '#cdc1b4'],
  2:    ['#eee4da', '#776e65'],
  4:    ['#ede0c8', '#776e65'],
  8:    ['#f2b179', '#f9f6f2'],
  16:   ['#f59563', '#f9f6f2'],
  32:   ['#f67c5f', '#f9f6f2'],
  64:   ['#f65e3b', '#f9f6f2'],
  128:  ['#edcf72', '#f9f6f2'],
  256:  ['#edcc61', '#f9f6f2'],
  512:  ['#edc850', '#f9f6f2'],
  1024: ['#edc53f', '#f9f6f2'],
  2048: ['#edc22e', '#f9f6f2'],
};

function tileColor(v) {
  return TILE_COLORS[v] || ['#ffffff', '#000000'];
}

function fontSize(v) {
  if (v < 100) return 'clamp(1.3rem,5vw,1.8rem)';
  if (v < 1000) return 'clamp(1rem,4vw,1.4rem)';
  return 'clamp(.8rem,3.5vw,1.1rem)';
}

let board, score, best = 0, over, won;

function init() {
  // Build 16 background cells
  const b = document.getElementById('board');
  b.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const d = document.createElement('div');
    d.className = 'cell-bg';
    b.appendChild(d);
  }
}

function newGame() {
  board = Array.from({length:4}, () => Array(4).fill(0));
  score = 0; over = false; won = false;
  addTile(); addTile();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('msg-bar').textContent = '';
  renderTiles();
  updateScore();
}

let tileSize, tileTop, tileLeft;

function calcGeometry() {
  const boardEl = document.getElementById('board');
  const rect = boardEl.getBoundingClientRect();
  const gap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 10;
  const padAndBorder = gap; // padding
  const inner = rect.width - padAndBorder * 2;
  tileSize = (inner - gap * 3) / 4;
  tileTop = (r) => rect.top - boardEl.getBoundingClientRect().top + padAndBorder + r * (tileSize + gap);
  tileLeft = (c) => padAndBorder + c * (tileSize + gap);
}

function renderTiles(animInfo) {
  calcGeometry();
  const layer = document.getElementById('tiles');
  layer.innerHTML = '';

  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const v = board[r][c];
      if (!v) continue;
      const el = document.createElement('div');
      el.className = 'tile';
      const [bg, fg] = tileColor(v);
      el.style.cssText = `
        width:${tileSize}px; height:${tileSize}px;
        top:${tileTop(r)}px; left:${tileLeft(c)}px;
        background:${bg}; color:${fg};
        font-size:${fontSize(v)};
      `;
      el.textContent = v;

      if (animInfo) {
        const key = `${r},${c}`;
        if (animInfo.merged && animInfo.merged.has(key)) el.classList.add('merged');
        else if (animInfo.newTile && animInfo.newTile === key) el.classList.add('new');
      }

      layer.appendChild(el);
    }
  }
}

function updateScore() {
  document.getElementById('score').textContent = score;
  if (score > best) { best = score; document.getElementById('best').textContent = best; }
}

function addTile() {
  const empty = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (!board[r][c]) empty.push([r,c]);
  if (!empty.length) return null;
  const [r,c] = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
  return `${r},${c}`;
}

function slideRow(row) {
  let a = row.filter(x => x);
  const merged = new Set();
  for (let i = 0; i < a.length - 1; i++) {
    if (a[i] === a[i+1] && !merged.has(i)) {
      a[i] *= 2; score += a[i];
      a.splice(i+1, 1);
      merged.add(i);
    }
  }
  while (a.length < 4) a.push(0);
  return a;
}

function move(dir) {
  if (over) return;
  const prev = JSON.stringify(board);
  const mergedCells = new Set();

  if (dir === 'left') {
    for (let r = 0; r < 4; r++) board[r] = slideRow(board[r]);
  } else if (dir === 'right') {
    for (let r = 0; r < 4; r++) board[r] = slideRow([...board[r]].reverse()).reverse();
  } else if (dir === 'up') {
    for (let c = 0; c < 4; c++) {
      const col = board.map(r => r[c]);
      const s = slideRow(col);
      s.forEach((v, r) => { board[r][c] = v; });
    }
  } else if (dir === 'down') {
    for (let c = 0; c < 4; c++) {
      const col = board.map(r => r[c]).reverse();
      const s = slideRow(col).reverse();
      s.forEach((v, r) => { board[r][c] = v; });
    }
  }

  const curr = JSON.stringify(board);
  if (curr === prev) return;

  // Detect merged tiles for animation
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (board[r][c] && JSON.parse(prev)[r][c] !== board[r][c] && JSON.parse(prev)[r][c] !== 0)
        mergedCells.add(`${r},${c}`);

  const newKey = addTile();
  updateScore();
  renderTiles({ merged: mergedCells, newTile: newKey });

  // Check win
  let hasWon = false;
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (board[r][c] === 2048) hasWon = true;
  if (hasWon && !won) {
    won = true;
    document.getElementById('msg-bar').textContent = '✦ You reached 2048!';
  }

  // Check game over
  if (!canMove()) {
    over = true;
    const ov = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = 'Game Over';
    ov.classList.add('show');
  }
}

function canMove() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      if (!board[r][c]) return true;
      if (c < 3 && board[r][c] === board[r][c+1]) return true;
      if (r < 3 && board[r][c] === board[r+1][c]) return true;
    }
  return false;
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  if (e.key.toLowerCase() === 'n') newGame();
});

document.getElementById('new-btn').addEventListener('click', newGame);

// Recalculate tile positions on resize
window.addEventListener('resize', () => renderTiles());

init();
newGame();
</script>
</body>
</html>
