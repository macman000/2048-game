<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f0;
    --surface: #ede8dc;
    --border: #d0c9b8;
    --accent: #8f7a66;
    --text: #2c2520;
    --text-muted: #9e9080;
    --tile-empty: #d8d0c0;
    --radius: 6px;
    --gap: 10px;
    --board-size: min(460px, 92vw);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: var(--board-size);
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    width: 100%;
  }

  #logo {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(2.8rem, 10vw, 4rem);
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -2px;
  }

  #right-header {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  #scores {
    display: flex;
    gap: 8px;
  }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 14px;
    text-align: center;
    min-width: 80px;
  }

  .score-label {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .score-val {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  #new-btn {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 7px 16px;
    cursor: pointer;
    font-weight: bold;
    transition: opacity .15s, transform .1s;
  }

  #new-btn:hover { opacity: .85; }
  #new-btn:active { transform: scale(.97); }

  /* ── Board ── */
  #board-wrap {
    position: relative;
    width: var(--board-size);
    height: var(--board-size);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: var(--gap);
    background: #bbada0;
    border-radius: 10px;
    padding: var(--gap);
    width: 100%;
    height: 100%;
    border: 1px solid var(--border);
  }

  .cell-bg {
    background: var(--tile-empty);
    border-radius: var(--radius);
  }

  /* Tile layer sits on top */
  #tiles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .tile {
    position: absolute;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    transition: top 80ms ease, left 80ms ease;
    will-change: top, left;
  }

  .tile.new {
    animation: pop .18s ease forwards;
  }

  .tile.merged {
    animation: bump .18s ease forwards;
  }

  @keyframes pop {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes bump {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  #msg-bar {
    height: 22px;
    font-size: 13px;
    color: #7a6f5a;
  }

  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(250,248,240,.88);
    border-radius: 10px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(2px);
  }

  #overlay.show { display: flex; }

  #overlay-title {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(1.4rem, 6vw, 2rem);
    font-weight: 900;
    color: var(--accent);
  }

  #overlay-sub {
    font-size: 13px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">2048</div>
    <div id="right-header">
      <div id="scores">
        <div class="score-card">
          <div class="score-label">Score</div>
          <div class="score-val" id="score">0</div>
        </div>
        <div class="score-card">
          <div class="score-label">Best</div>
          <div class="score-val" id="best">0</div>
        </div>
      </div>
      <button id="new-btn">New Game</button>
    </div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
    <div id="tiles"></div>
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-sub">press N or click New Game</div>
    </div>
  </div>

  <div id="msg-bar" id="msg"></div>
</div>

<script>
const TILE_COLORS = {
  2:    ['#eee4da','#776e65'], 4:    ['#ede0c8','#776e65'],
  8:    ['#f2b179','#f9f6f2'], 16:   ['#f59563','#f9f6f2'],
  32:   ['#f67c5f','#f9f6f2'], 64:   ['#f65e3b','#f9f6f2'],
  128:  ['#edcf72','#f9f6f2'], 256:  ['#edcc61','#f9f6f2'],
  512:  ['#edc850','#f9f6f2'], 1024: ['#edc53f','#f9f6f2'],
  2048: ['#edc22e','#f9f6f2'],
};
function tileColor(v){ return TILE_COLORS[v]||['#3c3a32','#f9f6f2']; }
function fontSize(v){ return v<100?'clamp(1.3rem,5vw,1.8rem)':v<1000?'clamp(1rem,4vw,1.4rem)':'clamp(.75rem,3vw,1rem)'; }

const ANIM_MS = 80;
let cells, score, best=0, over, won, nextId=1, animating=false;
const domTiles={};

function init(){
  const b=document.getElementById('board');
  b.innerHTML='';
  for(let i=0;i<16;i++){ const d=document.createElement('div'); d.className='cell-bg'; b.appendChild(d); }
}

function newGame(){
  cells=Array.from({length:4},()=>Array(4).fill(null));
  score=0; over=false; won=false; animating=false;
  // clear all DOM tiles
  for(const id in domTiles){ domTiles[id].remove(); delete domTiles[id]; }
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('msg-bar').textContent='';
  spawnTile(); spawnTile();
  fullRedraw();
  updateScore();
}

let tileSize, GAP=10;
function calcGeo(){
  const rect=document.getElementById('board').getBoundingClientRect();
  tileSize=(rect.width - GAP*5)/4;
}
function pos(r,c){ return { top: GAP + r*(tileSize+GAP), left: GAP + c*(tileSize+GAP) }; }

function makeTileEl(tile, isNew){
  const el=document.createElement('div');
  if(isNew) el.className='tile new';
  else el.className='tile';
  const {top,left}=pos(tile.r,tile.c);
  const [bg,fg]=tileColor(tile.value);
  el.style.cssText=`width:${tileSize}px;height:${tileSize}px;top:${top}px;left:${left}px;background:${bg};color:${fg};font-size:${fontSize(tile.value)};`;
  el.textContent=tile.value;
  document.getElementById('tiles').appendChild(el);
  domTiles[tile.id]=el;
}

function moveTileEl(tile){
  const el=domTiles[tile.id]; if(!el) return;
  const {top,left}=pos(tile.r,tile.c);
  el.style.top=top+'px'; el.style.left=left+'px';
}

function updateTileEl(tile){
  const el=domTiles[tile.id]; if(!el) return;
  const [bg,fg]=tileColor(tile.value);
  el.style.background=bg; el.style.color=fg;
  el.style.fontSize=fontSize(tile.value);
  el.textContent=tile.value;
}

function removeTileEl(id){
  const el=domTiles[id]; if(el){ el.remove(); delete domTiles[id]; }
}

function fullRedraw(){
  calcGeo();
  document.getElementById('tiles').innerHTML='';
  for(const k in domTiles) delete domTiles[k];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const t=cells[r][c];
    if(t){ t.r=r; t.c=c; makeTileEl(t, false); }
  }
}

function updateScore(){
  document.getElementById('score').textContent=score;
  if(score>best){ best=score; document.getElementById('best').textContent=best; }
}

function spawnTile(){
  const empty=[];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!cells[r][c]) empty.push([r,c]);
  if(!empty.length) return null;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  const tile={id:nextId++, value:Math.random()<0.9?2:4, r, c};
  cells[r][c]=tile;
  return tile;
}

// Slide a 1D array of tile|null, returns [{tile, remove?, merged?}]
function slideSlice(slice){
  const tiles=slice.filter(Boolean);
  const result=[];
  let i=0;
  while(i<tiles.length){
    if(i+1<tiles.length && tiles[i].value===tiles[i+1].value){
      result.push({tile:tiles[i], merged:true});
      result.push({tile:tiles[i+1], remove:true});
      i+=2;
    } else {
      result.push({tile:tiles[i]});
      i++;
    }
  }
  return result;
}

function move(dir){
  if(over||animating) return;
  calcGeo();

  // Snapshot current grid
  const snap=cells.map(row=>row.map(t=>t));

  // Check if move does anything
  const newCells=Array.from({length:4},()=>Array(4).fill(null));
  const removes=[], merges=[];
  let moved=false;

  function doDir(getSlice, setDest){
    for(let i=0;i<4;i++){
      const slice=getSlice(snap,i);
      const result=slideSlice(slice);
      let destIdx=0;
      result.forEach(m=>{
        if(m.remove){ removes.push(m.tile); return; }
        const [r2,c2]=setDest(i,destIdx++);
        if(m.tile.r!==r2||m.tile.c!==c2) moved=true;
        m.tile.r=r2; m.tile.c=c2;
        newCells[r2][c2]=m.tile;
        if(m.merged){ m.tile.value*=2; score+=m.tile.value; merges.push(m.tile); }
      });
    }
  }

  if(dir==='left')       doDir((g,i)=>[g[i][0],g[i][1],g[i][2],g[i][3]], (i,p)=>[i,p]);
  else if(dir==='right') doDir((g,i)=>[g[i][3],g[i][2],g[i][1],g[i][0]], (i,p)=>[i,3-p]);
  else if(dir==='up')    doDir((g,i)=>[g[0][i],g[1][i],g[2][i],g[3][i]], (i,p)=>[p,i]);
  else                   doDir((g,i)=>[g[3][i],g[2][i],g[1][i],g[0][i]], (i,p)=>[3-p,i]);

  if(!moved && removes.length===0) return;

  cells=newCells;
  animating=true;

  // Slide all tiles to new positions (CSS transition fires)
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const t=cells[r][c]; if(t) moveTileEl(t);
  }
  // Also slide tiles about to be removed (they slide into merge target)
  removes.forEach(t=>moveTileEl(t));

  setTimeout(()=>{
    removes.forEach(t=>removeTileEl(t.id));
    merges.forEach(t=>{
      updateTileEl(t);
      const el=domTiles[t.id];
      if(el){ el.classList.remove('merged'); void el.offsetWidth; el.classList.add('merged'); }
    });
    updateScore();

    const spawned=spawnTile();
    if(spawned){ calcGeo(); makeTileEl(spawned, true); }

    setTimeout(()=>{
      merges.forEach(t=>{ const el=domTiles[t.id]; if(el) el.classList.remove('merged'); });
      document.querySelectorAll('.tile.new').forEach(el=>el.classList.remove('new'));
      animating=false;

      let hasWon=false;
      for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(cells[r][c]&&cells[r][c].value===2048) hasWon=true;
      if(hasWon&&!won){ won=true; document.getElementById('msg-bar').textContent='You reached 2048!'; }
      if(!canMove()){ over=true; document.getElementById('overlay-title').textContent='Game Over'; document.getElementById('overlay').classList.add('show'); }
    }, 200);
  }, ANIM_MS);
}

function canMove(){
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    if(!cells[r][c]) return true;
    if(c<3 && cells[r][c].value===cells[r][c+1]?.value) return true;
    if(r<3 && cells[r][c].value===cells[r+1][c]?.value) return true;
  }
  return false;
}

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){ e.preventDefault(); move(map[e.key]); }
  if(e.key.toLowerCase()==='n') newGame();
});
document.getElementById('new-btn').addEventListener('click',newGame);
window.addEventListener('resize',()=>fullRedraw());

init();
newGame();
</script>
</body>
</html>
